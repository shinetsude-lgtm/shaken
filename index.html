<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>車検証管理 — 信越電装</title>
<meta name="theme-color" content="#2a86c8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#c8cdd4;color:#1a1a1a;font-size:15px}
.app{max-width:680px;margin:0 auto;min-height:100vh;background:#c8cdd4}

/* ===== ログイン ===== */
.login-screen{max-width:400px;margin:0 auto;padding:80px 24px 32px}
.login-logo{text-align:center;margin-bottom:40px}
.login-logo-text{font-size:22px;font-weight:800;color:#2a86c8;letter-spacing:2px}
.login-sub{font-size:12px;color:#aaa;margin-top:6px;letter-spacing:1px}
.login-card{background:#fff;border:1px solid #ddd;padding:32px 24px}
.login-label{font-size:11px;color:#555;margin-bottom:6px;display:block;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.login-input{width:100%;padding:10px 12px;background:#f8f8f8;border:1px solid #ddd;color:#1a1a1a;font-size:14px;margin-bottom:16px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:#2a86c8;background:#fff}
.login-btn{width:100%;padding:12px;background:#2a86c8;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:background .2s}
.login-btn:hover{background:#1a6ea8}
.login-error{color:#e53935;font-size:12px;margin-top:8px;text-align:center}

/* ===== ヘッダー ===== */
.header{background:#fff;border-bottom:3px solid #2a86c8;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.header-title{font-size:15px;font-weight:800;color:#2a86c8;letter-spacing:2px}
.header-user{font-size:12px;color:#555;display:flex;align-items:center;gap:8px}
.logout-btn{background:#2a86c8;border:none;color:#fff;font-size:11px;padding:5px 12px;cursor:pointer;font-weight:700;transition:background .2s}
.logout-btn:hover{background:#1a6ea8}
.subbar{background:#2a86c8;color:#fff;font-size:11px;padding:5px 16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== 一覧 ===== */
.list-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ddd;background:#fff}
.search-box{flex:1;padding:8px 12px;background:#f8f8f8;border:1px solid #ddd;color:#1a1a1a;font-size:13px;outline:none;transition:border-color .2s}
.search-box:focus{border-color:#2a86c8;background:#fff}
.search-box::placeholder{color:#aaa}
.add-btn{background:#2a86c8;color:#fff;border:none;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s}
.add-btn:hover{background:#1a6ea8}

/* フィルターバー */
.filter-bar{padding:8px 16px;display:flex;gap:6px;overflow-x:auto;background:#fff;border-bottom:1px solid #ddd}
.filter-btn{padding:4px 14px;border:2px solid #ddd;background:#fff;color:#555;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .2s;font-weight:600}
.filter-btn:hover{border-color:#2a86c8;color:#2a86c8}
.filter-btn.active{border-color:#2a86c8;background:#2a86c8;color:#fff}

.vehicle-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.empty-state{text-align:center;padding:60px 24px;color:#aaa;font-size:14px}

/* ===== カード ===== */
.vehicle-card{background:#fff;border:1px solid #ddd;border-left:4px solid #2a86c8;padding:14px 16px;cursor:pointer;transition:all .15s}
.vehicle-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.2);border-left-color:#1a6ea8}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.card-client{font-size:12px;color:#2a86c8;font-weight:700;letter-spacing:.5px}
.card-category{font-size:10px;padding:2px 8px;font-weight:700}
.cat-customer{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.cat-company{background:#fce4ec;color:#b71c1c;border:1px solid #f48fb1}
.card-owner{font-size:13px;color:#444;margin-bottom:6px}
.card-plate{font-size:20px;font-weight:900;color:#1a1a1a;letter-spacing:2px}
.card-car{font-size:12px;color:#666;margin-bottom:8px}
.card-bottom{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #f0f0f0;padding-top:8px;margin-top:4px}
.card-exp{font-size:12px;color:#333;font-weight:600}
.card-exp.expired{color:#e53935}
.card-exp.soon{color:#f57c00}
.card-meta{font-size:10px;color:#aaa;text-align:right;line-height:1.7}
.card-staff{font-size:11px;color:#2a86c8;margin-top:4px;font-weight:600}
.card-info-row{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.card-info-label{font-size:10px;color:#888;font-weight:700;min-width:36px;letter-spacing:.3px}
.card-info-val{font-size:13px;color:#1a1a1a;font-weight:500}

/* ===== 詳細 ===== */
.detail-screen{display:none;background:#c8cdd4;min-height:100vh}
.detail-header{background:#fff;border-bottom:3px solid #2a86c8;padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.back-btn{background:none;border:none;color:#2a86c8;font-size:20px;cursor:pointer;padding:4px;font-weight:700}
.detail-title{font-size:14px;font-weight:800;flex:1;color:#2a86c8;letter-spacing:1px}
.detail-body{padding:16px}
.detail-plate{font-size:28px;font-weight:900;color:#1a1a1a;letter-spacing:3px;margin-bottom:2px}
.detail-car{font-size:14px;color:#555;margin-bottom:4px}
.detail-client{font-size:12px;color:#2a86c8;font-weight:700;margin-bottom:16px}

/* 車検証画像 */
.shaken-files-section{margin-bottom:12px;background:#fff;border:1px solid #ddd;border-top:3px solid #2a86c8;padding:14px}
.section-title{font-size:10px;font-weight:800;color:#2a86c8;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.shaken-files-list{display:flex;flex-wrap:wrap;gap:8px}
.shaken-file-wrap{position:relative}
.shaken-thumb{width:90px;height:90px;object-fit:cover;cursor:pointer;border:1px solid #ddd;transition:all .2s}
.shaken-thumb:hover{border-color:#2a86c8;box-shadow:0 0 0 2px #90caf9}
.shaken-pdf-thumb{width:90px;height:90px;background:#e3f2fd;border:1px solid #90caf9;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#2a86c8;cursor:pointer;text-decoration:none;gap:4px;font-weight:700}
.shaken-file-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#e53935;color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

.action-btns{display:flex;gap:8px;margin-bottom:12px}
.edit-btn{flex:1;padding:10px;background:#2a86c8;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s}
.edit-btn:hover{background:#1a6ea8}
.delete-btn{padding:10px 16px;background:#fff;color:#e53935;border:2px solid #e53935;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.delete-btn:hover{background:#e53935;color:#fff}

.info-section{background:#fff;border:1px solid #ddd;border-top:3px solid #2a86c8;padding:14px 16px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f5f5f5}
.info-row:last-child{border-bottom:none}
.info-key{font-size:11px;color:#888;font-weight:700;flex-shrink:0;width:110px}
.info-val{font-size:13px;color:#1a1a1a;font-weight:500;text-align:right;word-break:break-all}

/* ===== 整備記録 ===== */
.karte-section{margin-bottom:24px}
.karte-add-btn{background:#2a86c8;border:none;color:#fff;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s}
.karte-add-btn:hover{background:#1a6ea8}
.karte-empty{text-align:center;color:#aaa;font-size:13px;padding:20px 0}
.karte-entry{background:#fff;border:1px solid #ddd;border-left:3px solid #2a86c8;padding:12px 14px;margin-bottom:8px}
.karte-entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.karte-date{font-size:11px;color:#2a86c8;font-weight:700}
.karte-staff-name{font-size:11px;color:#555;font-weight:600}
.karte-entry-actions{display:flex;gap:6px}
.karte-edit-btn{background:#2a86c8;border:none;color:#fff;padding:3px 10px;font-size:10px;cursor:pointer;font-weight:700;transition:background .2s}
.karte-edit-btn:hover{background:#1a6ea8}
.karte-del-btn{background:#fff;border:1px solid #ddd;color:#aaa;font-size:12px;cursor:pointer;padding:2px 8px;transition:all .2s}
.karte-del-btn:hover{border-color:#e53935;color:#e53935}
.karte-memo{font-size:13px;color:#333;line-height:1.7;margin-bottom:8px;white-space:pre-wrap}
.karte-files{display:flex;flex-wrap:wrap;gap:8px}
.karte-file-wrap{position:relative}
.karte-thumb{width:72px;height:72px;object-fit:cover;cursor:pointer;border:1px solid #ddd;transition:all .2s}
.karte-thumb:hover{border-color:#2a86c8}
.karte-pdf-thumb{width:72px;height:72px;background:#e3f2fd;border:1px solid #90caf9;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#2a86c8;cursor:pointer;text-decoration:none;gap:4px;font-weight:700}
.karte-file-del{position:absolute;top:-6px;right:-6px;width:16px;height:16px;background:#e53935;color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

/* ===== モーダル ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;overflow-y:auto;padding:20px 0}
.modal-overlay.open{display:block}
.modal{background:#fff;border-top:4px solid #2a86c8;max-width:560px;margin:0 auto;padding:20px 16px}
.modal-title{font-size:14px;font-weight:800;margin-bottom:16px;color:#2a86c8;letter-spacing:1px;text-transform:uppercase}
.ocr-section{background:#e3f2fd;border:1px solid #90caf9;padding:14px;margin-bottom:12px}
.ocr-section-title{font-size:11px;font-weight:800;color:#1565c0;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}
.upload-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.upload-area{border:2px dashed #90caf9;padding:14px 10px;text-align:center;cursor:pointer;position:relative;background:#fff;transition:all .2s}
.upload-area:hover{border-color:#2a86c8;background:#e3f2fd}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:22px;margin-bottom:4px}
.upload-label{font-size:11px;font-weight:700;color:#444;margin-bottom:2px}
.upload-hint{font-size:10px;color:#888}
.upload-preview{max-width:100%;max-height:80px;margin-top:8px;display:none;border:1px solid #ddd}
.ocr-btn{width:100%;padding:10px;background:#2a86c8;color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;transition:background .2s}
.ocr-btn:hover{background:#1a6ea8}
.ocr-btn:disabled{background:#ccc;color:#fff;cursor:not-allowed}
.ocr-status{font-size:11px;color:#666;text-align:center}
.qr-trigger-btn{width:100%;padding:9px;background:#fff;border:2px solid #2a86c8;color:#2a86c8;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:12px;transition:all .2s}
.qr-trigger-btn:hover{background:#2a86c8;color:#fff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.form-field{display:flex;flex-direction:column}
.form-field.full{grid-column:1/-1}
.form-label{font-size:10px;color:#888;margin-bottom:4px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.form-input{padding:9px 10px;background:#f8f8f8;border:1px solid #ddd;color:#1a1a1a;font-size:13px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:#2a86c8;background:#fff}
.form-select{padding:9px 10px;background:#f8f8f8;border:1px solid #ddd;color:#1a1a1a;font-size:13px;outline:none}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-cancel{flex:1;padding:10px;background:#fff;border:2px solid #ddd;color:#555;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.modal-cancel:hover{border-color:#888;color:#333}
.modal-save{flex:2;padding:10px;background:#2a86c8;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s}
.modal-save:hover{background:#1a6ea8}

/* 整備記録モーダル */
.karte-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;overflow-y:auto;padding:20px 0}
.karte-modal-overlay.open{display:block}
.karte-modal{background:#fff;border-top:4px solid #2a86c8;max-width:480px;margin:0 auto;padding:20px 16px}
.karte-file-preview{width:60px;height:60px;object-fit:cover;border:1px solid #ddd}

/* ライトボックス */
.lightbox-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center}
.lightbox-wrap.open{display:flex}
.lightbox-img{max-width:95vw;max-height:90vh;object-fit:contain}
.lightbox-close{position:fixed;top:16px;right:16px;background:#2a86c8;border:none;color:#fff;font-size:18px;width:36px;height:36px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.lightbox-prev,.lightbox-next{position:fixed;top:50%;transform:translateY(-50%);background:#2a86c8;border:none;color:#fff;font-size:22px;width:40px;height:40px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.lightbox-prev{left:8px}.lightbox-next{right:8px}

/* QR */
.qr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;flex-direction:column;align-items:center;justify-content:center}
.qr-overlay.open{display:flex}
#qrVideo{width:260px;height:260px;object-fit:cover;border:2px solid #2a86c8}
.qr-msg{color:#fff;font-size:13px;margin:16px 0}
.qr-close-btn{background:#2a86c8;border:none;color:#fff;padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="app">

<!-- ログイン -->
<div id="loginScreen">
  <div class="login-screen">
    <div class="login-logo">
      <img src="%E4%BC%9A%E7%A4%BE%E3%83%AD%E3%82%B4.png" alt="SHIN-ETSU.D" style="height:80px;object-fit:contain;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto">
      <div class="login-logo-text">車検証管理システム</div>
      <div class="login-sub">SHIN-ETSU DENSO</div>
    </div>
    <div class="login-card">
      <label class="login-label">Email</label>
      <input class="login-input" type="email" id="loginEmail" placeholder="example@email.com">
      <label class="login-label">Password</label>
      <input class="login-input" type="password" id="loginPass" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()">LOGIN</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- メインアプリ -->
<div id="mainApp" style="display:none">
  <div class="header">
    <div class="header-title">車検証管理</div>
    <div class="header-user">
      <span id="headerUserName"></span>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>
  <div class="subbar" id="subbar" style="display:none"></div>
  <div class="list-header">
    <input class="search-box" id="searchBox" placeholder="ナンバー・所有者・依頼者・担当者で検索" oninput="renderList()">
    <button class="add-btn" onclick="openModal()">＋ 新規登録</button>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('customer',this)">お客様車両</button>
    <button class="filter-btn" onclick="setFilter('company',this)">社用車</button>
  </div>
  <div class="vehicle-list" id="vehicleList"></div>
</div>

<!-- 詳細画面 -->
<div class="detail-screen" id="detailScreen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitle">詳細</div>
  </div>
  <div class="detail-body">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <div class="detail-plate" id="d-plate">—</div>
      <span id="d-category-badge" class="card-category"></span>
    </div>
    <div class="detail-car" id="d-car">—</div>
    <div class="detail-client" id="d-client-header"></div>

    <div class="shaken-files-section" id="shakenFilesSection" style="display:none">
      <div class="section-title">📎 車検証ファイル</div>
      <div class="shaken-files-list" id="shakenFilesList"></div>
    </div>

    <div class="action-btns">
      <button class="edit-btn" onclick="openEditModal()">✏️ 編集</button>
      <button class="delete-btn" onclick="deleteVehicle()">削除</button>
    </div>

    <div class="info-section">
      <div class="section-title">車両情報</div>
      <div class="info-row"><div class="info-key">登録番号</div><div class="info-val" id="d-plate2">—</div></div>
      <div class="info-row"><div class="info-key">車名</div><div class="info-val" id="d-carname">—</div></div>
      <div class="info-row"><div class="info-key">型式</div><div class="info-val" id="d-model">—</div></div>
      <div class="info-row"><div class="info-key">車体の形状</div><div class="info-val" id="d-shape">—</div></div>
      <div class="info-row"><div class="info-key">車台番号</div><div class="info-val" id="d-chassis">—</div></div>
      <div class="info-row"><div class="info-key">初年度登録</div><div class="info-val" id="d-firstreg">—</div></div>
      <div class="info-row"><div class="info-key">登録年月日</div><div class="info-val" id="d-regdate">—</div></div>
      <div class="info-row"><div class="info-key">車検有効期限</div><div class="info-val" id="d-exp">—</div></div>
    </div>
    <div class="info-section">
      <div class="section-title">所有者・依頼者</div>
      <div class="info-row"><div class="info-key">所有者名</div><div class="info-val" id="d-owner">—</div></div>
      <div class="info-row"><div class="info-key">住所</div><div class="info-val" id="d-addr">—</div></div>
      <div class="info-row"><div class="info-key">依頼者（請求先）</div><div class="info-val" id="d-client">—</div></div>
    </div>
    <div class="info-section">
      <div class="section-title">管理情報</div>
      <div class="info-row"><div class="info-key">担当者</div><div class="info-val" id="d-staff">—</div></div>
      <div class="info-row"><div class="info-key">備考</div><div class="info-val" id="d-note">—</div></div>
      <div class="info-row"><div class="info-key">登録日</div><div class="info-val" id="d-created">—</div></div>
      <div class="info-row"><div class="info-key">更新日</div><div class="info-val" id="d-updated">—</div></div>
    </div>

    <div class="karte-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title" style="margin:0">🔧 整備記録</div>
        <button class="karte-add-btn" onclick="openKarteModal()">＋ 記録を追加</button>
      </div>
      <div id="karteList"></div>
    </div>
  </div>
</div>

<!-- 車両登録/編集モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">新規登録</div>
    <div class="ocr-section">
      <div class="ocr-section-title">📷 OCR自動読み取り</div>
      <div class="upload-pair">
        <div class="upload-area">
          <input type="file" id="ocrFile1" accept="image/*,application/pdf" onchange="onFileSelect(1)">
          <div class="upload-icon">📄</div>
          <div class="upload-label">① 自動車検査証</div>
          <div class="upload-hint">表面</div>
          <img class="upload-preview" id="preview1">
        </div>
        <div class="upload-area">
          <input type="file" id="ocrFile2" accept="image/*,application/pdf" onchange="onFileSelect(2)">
          <div class="upload-icon">📋</div>
          <div class="upload-label">② 記録事項</div>
          <div class="upload-hint">裏面</div>
          <img class="upload-preview" id="preview2">
        </div>
      </div>

function toDateStr(ts){
  if(!ts)return'—';
  let d=ts.toDate?ts.toDate():new Date(ts);
  return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');
}
function expClass(str){
  if(!str)return'';
  const m=str.match(/(?:令和|平成|昭和)\s*(\d+|元)\s*年\s*(\d+)\s*月\s*(\d+)\s*日/);
  if(!m)return'';
  const eraBase={'令和':2018,'平成':1988,'昭和':1925};
  const eraM=str.match(/(令和|平成|昭和)/);
  if(!eraM)return'';
  const base=eraBase[eraM[1]];
  const y=(m[1]==='元'?1:parseInt(m[1]))+base;
  const d=new Date(y,parseInt(m[2])-1,parseInt(m[3]));
  const diff=(d-new Date())/(1000*60*60*24);
  if(diff<0)return'expired';
  if(diff<60)return'soon';
  return'';
}
function expDays(str){
  if(!str)return'';
  const m=str.match(/(?:令和|平成|昭和)\s*(\d+|元)\s*年\s*(\d+)\s*月\s*(\d+)\s*日/);
  if(!m)return'';
  const eraBase={'令和':2018,'平成':1988,'昭和':1925};
  const eraM=str.match(/(令和|平成|昭和)/);
  if(!eraM)return'';
  const base=eraBase[eraM[1]];
  const y=(m[1]==='元'?1:parseInt(m[1]))+base;
  const d=new Date(y,parseInt(m[2])-1,parseInt(m[3]));
  const diff=Math.ceil((d-new Date())/(1000*60*60*24));
  if(diff<0)return`（期限切れ ${Math.abs(diff)}日超過）`;
  if(diff===0)return'（本日期限）';
  if(diff<60)return`（残り${diff}日）`;
  return'';
}

async function loadVehicles(){
  const q=query(collection(db,'vehicles'),orderBy('updatedAt','desc'));
  const snap=await getDocs(q);
  vehicles=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderList();
  renderSubbar();
  renderFilterClients();
}
function renderSubbar(){
  const sb=document.getElementById('subbar');
  if(!vehicles.length){sb.style.display='none';return;}
  const v=vehicles[0];
  const lastKarte=v.karteList&&v.karteList.length?v.karteList[v.karteList.length-1].memo||'':'';
  sb.textContent=`最終更新 ▸ ${v.ownerName||'—'} ／ 依頼：${v.clientName||'—'} ／ 担当：${v.staff||'—'} ／ 整備：${lastKarte.slice(0,25)||'—'}`;
  sb.style.display='block';
}
function renderFilterClients(){
  const bar=document.getElementById('filterBar');
  bar.querySelectorAll('.dynamic-filter').forEach(b=>b.remove());
  const clients=[...new Set(vehicles.map(v=>v.clientName).filter(Boolean))].sort();
  clients.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='filter-btn dynamic-filter';
    btn.textContent=c;
    btn.onclick=()=>setFilter('client:'+c,btn);
    bar.appendChild(btn);
  });
}
function renderList(){
  const q=(document.getElementById('searchBox').value||'').trim().toLowerCase();
  const list=document.getElementById('vehicleList');
  let filtered=vehicles.filter(v=>{
    if(currentFilter==='customer'&&v.category!=='customer')return false;
    if(currentFilter==='company'&&v.category!=='company')return false;
    if(currentFilter.startsWith('client:')&&v.clientName!==currentFilter.slice(7))return false;
    if(!q)return true;
    return (v.plate||'').toLowerCase().includes(q)||(v.ownerName||'').toLowerCase().includes(q)||(v.clientName||'').toLowerCase().includes(q)||(v.staff||'').toLowerCase().includes(q);
  });
  if(!filtered.length){list.innerHTML=`<div class="empty-state">該当する車両がありません</div>`;return;}
  list.innerHTML=filtered.map(v=>{
    const ec=expClass(v.expDate);
    const catClass=v.category==='company'?'cat-company':'cat-customer';
    const catLabel=v.category==='company'?'社用車':'お客様';
    return `<div class="vehicle-card" onclick="openDetail('${v.id}')">
      <div class="card-top">
        <div class="card-plate">${v.plate||'—'}</div>
        <span class="card-category ${catClass}">${catLabel}</span>
      </div>
      <div class="card-info-row"><span class="card-info-label">依頼者</span><span class="card-info-val">${v.clientName||'—'}</span></div>
      <div class="card-info-row"><span class="card-info-label">所有者</span><span class="card-info-val">${v.ownerName||'—'}</span></div>
      <div class="card-car">${v.carName||'—'}</div>
      <div class="card-bottom">
        <div><div class="card-exp ${ec}">車検: ${v.expDate||'—'} ${expDays(v.expDate)}</div>${v.staff?`<div class="card-staff">担当: ${v.staff}</div>`:''}</div>
        <div class="card-meta">登録: ${toDateStr(v.createdAt)}<br>更新: ${toDateStr(v.updatedAt)}</div>
      </div>
    </div>`;
  }).join('');
}

window.openDetail=async(id)=>{
  currentDetailId=id;
  const snap=await getDoc(doc(db,'vehicles',id));

function renderShakenFiles(v){

window.saveKarte=async()=>{
  const btn=document.getElementById('karteSaveBtn');
  btn.disabled=true;btn.textContent='保存中…';
  try{
    const snap=await getDoc(doc(db,'vehicles',currentDetailId));
    let karteList=[...(snap.data().karteList||[])];
    const editIdx=document.getElementById('karteEditIndex').value;
    const now=new Date();
    const dateStr=now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0');
    let uploadedFiles=[];
    for(const f of karteFiles){
      const path=`karte/${currentDetailId}/${Date.now()}_${f.name}`;
      const r=ref(storage,path);
      await uploadBytes(r,f);
      const url=await getDownloadURL(r);
      uploadedFiles.push({name:f.name,url,path});
    }
    const entry={staff:document.getElementById('km-staff').value.trim(),memo:document.getElementById('km-memo').value.trim(),date:dateStr,files:uploadedFiles};
    if(editIdx!==''){
      const idx=parseInt(editIdx);
      entry.files=[...(karteList[idx].files||[]),...uploadedFiles];
      karteList[idx]={...karteList[idx],...entry};
    } else {karteList.push(entry);}
    await updateDoc(doc(db,'vehicles',currentDetailId),{karteList,updatedAt:serverTimestamp()});
    closeKarteModal();
    await openDetail(currentDetailId);
  }catch(e){alert('保存に失敗しました: '+e.message);}
  finally{btn.disabled=false;btn.textContent='保存';}
};

};

  await updateDoc(doc(db,'vehicles',vid),{karteList:list,updatedAt:serverTimestamp()});
  await openDetail(vid);
};

  document.getElementById('f-model').value=v.model||'';
  document.getElementById('f-shape').value=v.shape||'';
  document.getElementById('f-chassis').value=v.chassis||'';
  document.getElementById('f-owner').value=v.ownerName||'';
  document.getElementById('f-exp').value=v.expDate||'';
  document.getElementById('f-firstreg').value=v.firstReg||'';
  document.getElementById('f-regdate').value=v.regDate||'';
  document.getElementById('f-staff').value=v.staff||'';
  document.getElementById('f-addr').value=v.address||'';
  document.getElementById('f-note').value=v.note||'';
  document.getElementById('f-client').value=v.clientName||'';
  document.getElementById('f-category').value=v.category||'customer';
  document.getElementById('ocrStatus').textContent='';
  document.getElementById('ocrBtn').disabled=true;
  document.getElementById('preview1').style.display='none';
  document.getElementById('preview2').style.display='none';
  document.getElementById('modalOverlay').classList.add('open');
};
window.closeModal=()=>document.getElementById('modalOverlay').classList.remove('open');
window.saveVehicle=async()=>{
  const plate=document.getElementById('f-plate').value.trim();
  if(!plate){alert('登録番号は必須です');return;}
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='保存中…';
  try{
    let shakenFiles=[];
    if(editingId){const snap=await getDoc(doc(db,'vehicles',editingId));shakenFiles=[...((snap.data().shakenFiles)||[])];}
    for(let i=0;i<2;i++){
      if(selectedFiles[i]){
        const f=selectedFiles[i];
        const path=`shaken/${editingId||Date.now()}/${Date.now()}_${f.name}`;
        const r=ref(storage,path);
        await uploadBytes(r,f);
        const url=await getDownloadURL(r);
        shakenFiles.push({name:f.name,url,path});
      }
    }
    const data={plate,carName:document.getElementById('f-car').value.trim(),model:document.getElementById('f-model').value.trim(),shape:document.getElementById('f-shape').value.trim(),chassis:document.getElementById('f-chassis').value.trim(),ownerName:document.getElementById('f-owner').value.trim(),expDate:document.getElementById('f-exp').value.trim(),firstReg:document.getElementById('f-firstreg').value.trim(),regDate:document.getElementById('f-regdate').value.trim(),staff:document.getElementById('f-staff').value.trim(),address:document.getElementById('f-addr').value.trim(),note:document.getElementById('f-note').value.trim(),category:document.getElementById('f-category').value,clientName:document.getElementById('f-client').value.trim(),shakenFiles,updatedAt:serverTimestamp()};
    if(editingId){await updateDoc(doc(db,'vehicles',editingId),data);}
    else{data.createdAt=serverTimestamp();data.karteList=[];await addDoc(collection(db,'vehicles'),data);}
    closeModal();
    if(currentDetailId)await openDetail(currentDetailId);
    else await loadVehicles();
  }catch(e){alert('保存に失敗しました: '+e.message);}
  finally{btn.disabled=false;btn.textContent='保存';}
};
window.deleteVehicle=async()=>{
  if(!confirm('この車両を削除しますか？\nこの操作は取り消せません。'))return;
  await deleteDoc(doc(db,'vehicles',currentDetailId));
  closeDetail();
};

window.onFileSelect=(n)=>{
  const file=document.getElementById('ocrFile'+n).files[0];
  if(!file)return;
  selectedFiles[n-1]=file;
  const prev=document.getElementById('preview'+n);
  if(file.type.startsWith('image/')){prev.src=URL.createObjectURL(file);prev.style.display='block';}
  else{prev.style.display='none';}
  document.getElementById('ocrBtn').disabled=false;
  document.getElementById('ocrStatus').textContent='読み取り準備OK';
};
window.runOCR=async()=>{
  document.getElementById('ocrBtn').disabled=true;
  document.getElementById('ocrStatus').textContent='🔍 OCR読み取り中…';
  try{
    let allText='';
    for(let i=0;i<2;i++){
      if(!selectedFiles[i])continue;
      const b64=await toBase64(selectedFiles[i]);
      const resp=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'DOCUMENT_TEXT_DETECTION',maxResults:1}]}]})});
      const json=await resp.json();
      allText+=(json.responses?.[0]?.fullTextAnnotation?.text||'')+'\n';
    }
    if(!allText.trim()){document.getElementById('ocrStatus').textContent='⚠️ テキストを検出できませんでした';return;}
    parseOcrText(allText);
    document.getElementById('ocrStatus').textContent='✅ 読み取り完了！内容を確認してください';
  }catch(e){document.getElementById('ocrStatus').textContent='❌ エラー: '+e.message;}
  finally{document.getElementById('ocrBtn').disabled=false;}
};
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
function setVal(id,val){if(val&&document.getElementById(id)&&!document.getElementById(id).value)document.getElementById(id).value=val;}
function seireiToWareki(y,m,d){
  if(y>=2019||(y===2019&&m>=5))return`令和${y-2018}年${m}月${d?d+'日':''}`;
  if(y>=1989)return`平成${y-1988}年${m}月${d?d+'日':''}`;
  if(y>=1926)return`昭和${y-1925}年${m}月${d?d+'日':''}`;
  return`${y}年${m}月${d?d+'日':''}`;
}
function parseOcrText(t){
  const plateM=t.match(/(札幌|仙台|大宮|千葉|練馬|多摩|八王子|品川|足立|横浜|川崎|相模|湘南|静岡|浜松|名古屋|三河|尾張|岐阜|京都|なにわ|大阪|神戸|姫路|福岡|北九州|広島|岡山|宮城|新潟|長野|富山|石川|福井|山梨|三重|滋賀|奈良|和歌山|鳥取|島根|山口|徳島|香川|愛媛|高知|佐賀|長崎|熊本|大分|宮崎|鹿児島|沖縄)\s*\d{3,4}\s*[あ-んア-ン一-龯]\s*\d{1,4}/);
  if(plateM)setVal('f-plate',plateM[0].replace(/\s+/g,' '));
  const eraBase={'令和':2018,'平成':1988,'昭和':1925};
  const expM=t.match(/(?:有効期間の満了|満了日)[^\d令平昭]{0,15}((令和|平成|昭和)\s*(\d+|元)\s*年\s*(\d+)\s*月\s*(\d+)\s*日)/);
  if(expM){const b=eraBase[expM[2]];const y=(expM[3]==='元'?1:parseInt(expM[3]))+b;setVal('f-exp',seireiToWareki(y,parseInt(expM[4]),parseInt(expM[5])));}
  const fregM=t.match(/初年度登録[^\d令平昭]{0,5}((令和|平成|昭和)\s*(\d+|元)\s*年\s*(\d+)\s*月)/);
  if(fregM){const b=eraBase[fregM[2]];const y=(fregM[3]==='元'?1:parseInt(fregM[3]))+b;setVal('f-firstreg',seireiToWareki(y,parseInt(fregM[4]),null));}
  const regM=t.match(/登録年月日[^\d令平昭]{0,5}((令和|平成|昭和)\s*(\d+|元)\s*年\s*(\d+)\s*月\s*(\d+)\s*日)/);
  if(regM){const b=eraBase[regM[2]];const y=(regM[3]==='元'?1:parseInt(regM[3]))+b;setVal('f-regdate',seireiToWareki(y,parseInt(regM[4]),parseInt(regM[5])));}
  const chassisM=t.match(/車台番号[^\w]{0,5}([A-Z0-9]{2,6}-[A-Z0-9]{4,10})/);
  if(chassisM)setVal('f-chassis',chassisM[1]);
  const modelM=t.match(/(?:^|[\s\n])型式[\s\n]{0,3}([A-Z0-9]{2,4}-[A-Z0-9]{2,6})/m);
  if(modelM)setVal('f-model',modelM[1]);
  const carNameM=t.match(/車名[\s\u3000:\uff1a]{0,3}([^\s\n]{2,10})/);
  if(carNameM)setVal('f-car',carNameM[1]);
  else{for(const n of['トヨタ','日産','ホンダ','マツダ','スバル','三菱','ダイハツ','スズキ','いすゞ','日野','ミニキャブ','キャラバン','ハイエース','プリウス','ヴェゼル','カローラ','フィット','ノート','セレナ']){if(t.includes(n)){setVal('f-car',n);break;}}}
  const ownerM=t.match(/(?:所有者|使用者)(?:の氏名)?[\s\u3000]{0,5}([^\s\n]{2,30})/);
  if(ownerM)setVal('f-owner',ownerM[1].trim());
  const addrM=t.match(/(?:所有者の住所|使用の本拠の位置)[\s\u3000]{0,5}([^\n]{6,50})/);
  if(addrM)setVal('f-addr',addrM[1].trim());
}

let qrStream=null;
window.openQR=async()=>{
  document.getElementById('qrOverlay').classList.add('open');
  try{
    qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    document.getElementById('qrVideo').srcObject=qrStream;
    if('BarcodeDetector' in window){
      const det=new BarcodeDetector({formats:['qr_code']});
      const scan=async()=>{if(!qrStream)return;try{const codes=await det.detect(document.getElementById('qrVideo'));if(codes.length){closeQR();parseQrData(codes[0].rawValue);return;}}catch(e){}requestAnimationFrame(scan);};
      document.getElementById('qrVideo').addEventListener('playing',()=>requestAnimationFrame(scan),{once:true});
    }else{document.getElementById('qrMsg').textContent='このブラウザはQR未対応です';}
  }catch(e){document.getElementById('qrMsg').textContent='カメラにアクセスできませんでした';}
};
window.closeQR=()=>{if(qrStream){qrStream.getTracks().forEach(t=>t.stop());qrStream=null;}document.getElementById('qrOverlay').classList.remove('open');};
function parseQrData(text){
  document.getElementById('ocrStatus').textContent='✅ QRコード読み取り成功！';
  const p=text.split(/[,\n\t]/);
  if(p[0]&&!document.getElementById('f-plate').value)document.getElementById('f-plate').value=p[0];
  if(p[1]&&!document.getElementById('f-chassis').value)document.getElementById('f-chassis').value=p[1];
  if(p[3]&&!document.getElementById('f-owner').value)document.getElementById('f-owner').value=p[3];
}

window.openLightbox=(url)=>{
  lbIndex=lbImages.indexOf(url);if(lbIndex<0){lbIndex=0;lbImages=[url];}
  document.getElementById('lightboxImg').src=lbImages[lbIndex];
  document.getElementById('lbPrev').style.display=lbImages.length>1?'flex':'none';
  document.getElementById('lbNext').style.display=lbImages.length>1?'flex':'none';
  document.getElementById('lightboxWrap').classList.add('open');
};
window.openLightboxSingle=(url)=>{
  lbImages=[url];lbIndex=0;
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lbPrev').style.display='none';
  document.getElementById('lbNext').style.display='none';
  document.getElementById('lightboxWrap').classList.add('open');
};
window.closeLightbox=(e)=>{if(!e||e.target===document.getElementById('lightboxWrap'))document.getElementById('lightboxWrap').classList.remove('open');};
window.lbNav=(dir)=>{lbIndex=(lbIndex+dir+lbImages.length)%lbImages.length;document.getElementById('lightboxImg').src=lbImages[lbIndex];};
</script>
